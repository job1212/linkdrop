name: linkdrop
description: Universal content downloader powered by yt-dlp

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  dio: ^5.4.0
  path_provider: ^2.1.2
  open_file: ^3.3.2
  permission_handler: ^11.3.0
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.5
  universal_html: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
